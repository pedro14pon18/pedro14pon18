<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Conversor de Tempo</h1>
    </header>

    <main>
        <div class="converter">
            <label for="tempo">Digite o valor:</label>
            <input type="number" id="tempo" placeholder="Ex: 120">
            
            <label for="unidadeOrigem">De:</label>
            <select id="unidadeOrigem">
                <option value="segundos">Segundos</option>
                <option value="minutos">Minutos</option>
                <option value="horas">Horas</option>
            </select>
            
            <label for="unidadeDestino">Para:</label>
            <select id="unidadeDestino">
                <option value="segundos">Segundos</option>
                <option value="minutos">Minutos</option>
                <option value="horas">Horas</option>
            </select>
            
            <button id="converterBtn">Converter</button>
            
            <p id="resultado">Resultado: 0</p>
        </div>
    </main>

    <footer>
        <p>Feito com 💻 por você!</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
